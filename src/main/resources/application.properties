spring.application.name=rest-api-template

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rest_api_template}
spring.datasource.username=${DB_USERNAME:app_user}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.swagger-ui.path=/swagger-ui.html

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
