services:
  postgres:
    image: postgres:16-alpine
    container_name: rest-api-template-postgres
    environment:
      POSTGRES_DB: rest_api_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rest_api_template"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
